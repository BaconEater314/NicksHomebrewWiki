    <!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Updated spell list using JSON data.">
        <meta name="author" content="Cody Owens">
        <title>Nick's Homebrew Wiki - Spells Page</title>

        <link rel = "stylesheet" href = "../../Global.css" />
    </head>
    <body>
  <main class="page-shell">
    <section class="page-card">
      <h1>Spells</h1>
      <p class="intro">
        Browse all spells in the wiki. Use the filters below to narrow the list,
        then click a spell name to open its full entry.
      </p>

      <section class="filters">
        <div>
          <label for="searchInput">Search by Name</label>
          <input type="text" id="searchInput" placeholder="Search spells..." />
        </div>

        <div>
          <label for="levelFilter">Level</label>
          <select id="levelFilter">
            <option value="">All Levels</option>
            <option value="Cantrip">Cantrip</option>
            <option value="1">1st</option>
            <option value="2">2nd</option>
            <option value="3">3rd</option>
            <option value="4">4th</option>
            <option value="5">5th</option>
            <option value="6">6th</option>
            <option value="7">7th</option>
            <option value="8">8th</option>
            <option value="9">9th</option>
          </select>
        </div>

        <div>
          <label for="schoolFilter">School</label>
          <select id="schoolFilter">
            <option value="">All Schools</option>
            <option value="Abjuration">Abjuration</option>
            <option value="Conjuration">Conjuration</option>
            <option value="Divination">Divination</option>
            <option value="Enchantment">Enchantment</option>
            <option value="Evocation">Evocation</option>
            <option value="Illusion">Illusion</option>
            <option value="Necromancy">Necromancy</option>
            <option value="Transmutation">Transmutation</option>
          </select>
        </div>

        <div>
          <label for="ritualFilter">Ritual</label>
          <select id="ritualFilter">
            <option value="">Any</option>
            <option value="true">Ritual Only</option>
            <option value="false">Non-Ritual</option>
          </select>
        </div>

        <div>
          <label for="concentrationFilter">Concentration</label>
          <select id="concentrationFilter">
            <option value="">Any</option>
            <option value="true">Concentration Only</option>
            <option value="false">Non-Concentration</option>
          </select>
        </div>

        <div>
          <label for="classFilter">Class</label>
          <select id="classFilter">
            <option value="">All Classes</option>
            <option value="Bard">Bard</option>
            <option value="Cleric">Cleric</option>
            <option value="Druid">Druid</option>
            <option value="Paladin">Paladin</option>
            <option value="Ranger">Ranger</option>
            <option value="Sorcerer">Sorcerer</option>
            <option value="Warlock">Warlock</option>
            <option value="Wizard">Wizard</option>
          </select>
        </div>

        <div class="filter-actions">
          <button id="clearFilters" type="button">Clear Filters</button>
        </div>
      </section>

      <div class="results-bar">
        <span id="resultsCount">Loading spells...</span>
      </div>

      <div class="table-wrap">
        <table id="spellsTable">
          <thead>
            <tr>
              <th data-sort="name">Spell Name</th>
              <th data-sort="level">Level</th>
              <th data-sort="school">School</th>
              <th data-sort="castingTime">Casting Time</th>
              <th data-sort="range">Range</th>
              <th data-sort="duration">Duration</th>
              <th data-sort="ritual">Ritual</th>
              <th data-sort="concentration">Concentration</th>
              <th data-sort="classes">Classes</th>
            </tr>
          </thead>
          <tbody id="spellsTableBody"></tbody>
        </table>
      </div>

      <div id="noResults" class="no-results" hidden>
        No spells matched the current filters.
      </div>
    </section>
  </main>

  <script src="Spells-Json.js"></script>
</body>
</html>
