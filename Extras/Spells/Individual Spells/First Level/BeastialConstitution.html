<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beastial Constitution</title>
    <meta name="description" content="Beastial Constitution spell.">
    <meta name="author" content="Nicholas Beaty & Cody Owens">

    <link rel="stylesheet" type="text/css" href="../../../../Atributes.css">
</head>
<body>
    <main class="spell-page">
        <article class="spell-entry">
            <h1>Beastial Constitution</h1>
            <p class="spell-subtitle"><em>First Level Beastial Incantation</em></p>

            <section class="spell-meta">
                <p><strong>Casting Time:</strong> 1 Action</p>
                <p><strong>Range:</strong> Touch</p>
                <p><strong>Components:</strong> V, S</p>
                <p><strong>Duration:</strong> Instantaneous</p>
            </section>

            <hr>

            <section class="spell-body">
                <p>
                    You touch a creature, removing any blood loss buildup on it and any penalties to its movement.
                </p>
            </section>
            <section class="spell-footer">
                <p><strong>Spell Lists:</strong> Cleric, Druid, Paladin, Ranger</p>
            </section>
        </article>
    </main>
</body>
</html>
