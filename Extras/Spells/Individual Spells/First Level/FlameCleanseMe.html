<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flame Cleanse Me</title>
    <meta name="description" content="Flame Cleanse Me spell.">
    <meta name="author" content="Nicholas Beaty">

    <link rel="stylesheet" type="text/css" href="../../../../Atributes.css">
</head>
<body>
    <main class="spell-page">
        <article class="spell-entry">
            <h1>Flame Cleanse Me</h1>
            <p class="spell-subtitle"><em>First Level Giant's Flame Incantation</em></p>

            <section class="spell-meta">
                <p><strong>Casting Time:</strong> 1 Action</p>
                <p><strong>Range:</strong> touch</p>
                <p><strong>Components:</strong> V, S</p>
                <p><strong>Duration:</strong> Instantaneous</p>
            </section>

            <hr>

            <section class="spell-body">
                <p>
                    You touch a willing creature with cleansing flame, dealing 1d4 fire damage and removing any traces of poison or scarlet rot.
                </p>

            </section>

            <section class="spell-footer">
                <p><strong>Spell Lists:</strong> Cleric, Druid, Ranger</p>
            </section>
        </article>
    </main>
</body>
</html>
